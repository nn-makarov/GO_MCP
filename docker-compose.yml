version: '3.8'

services:
  mcp-server:
    build: .
    command: ./mcp-server
    ports:
      - "8081:8081"
    restart: unless-stopped

  telegram-bot:
    build: .
    command: ./telegram-bot
    ports:
      - "8080:8080"
    environment:
      - TELEGRAM_BOT_TOKEN=${8736814263:AAEvAmfBeEiaSuBQY6po-Cr3aeHjtIpKvS4}
    depends_on:
      - mcp-server
    restart: unless-stopped